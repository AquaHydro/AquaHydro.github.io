name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write   # needed to push AI summaries back to the repo
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Cache NPM dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.OS }}-node24-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.OS }}-node24-

      - name: Install Dependencies
        run: npm ci

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── AI Summarization ──────────────────────────────────────────────────────
      # Runs AFTER a successful build so bad frontmatter is caught before commit.
      # Calls Gemini API for every post that lacks a `summary` frontmatter field.
      # Posts that already have a summary are skipped (idempotent).
      # The step is a no-op when GEMINI_API_KEY is not configured.
      - name: Summarize new posts
        continue-on-error: true   # API failures must not block deployment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node ci/summarize.mjs

      # Commit generated summaries so future builds skip them (no re-calling the API).
      # [skip ci] prevents this commit from triggering another workflow run.
      - name: Commit summaries back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet source/_posts/; then
            echo "No new summaries — nothing to commit."
          else
            git add source/_posts/
            git commit -m "chore: add AI summaries [skip ci]"
            git push
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=blog --branch=main
